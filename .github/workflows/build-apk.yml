name: 🍆 Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'server/**'
      - 'workers-server/**'
      - '_github_setup/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'   # Required for AGP 8.9.1 + Kotlin 2.1.0 + compileSdk 36
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Generate build number
        id: build_info
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d-%H%M')
          # 사장님 지시: 집파일명/태그/릴리스명 모두 v1.0.<빌드번호> 한 가지 형태로 통일
          # 예) v1.0.55  →  eggplant-v1.0.55.apk
          VERSION_LABEL="v1.0.${BUILD_NUMBER}"
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "version_label=${VERSION_LABEL}" >> $GITHUB_OUTPUT
          echo "tag=${VERSION_LABEL}" >> $GITHUB_OUTPUT

      - name: 🏗️ Build SINGLE universal APK
        run: |
          # `flutter build apk` (no split flags) produces exactly ONE
          # universal APK at build/app/outputs/flutter-apk/app-release.apk.
          # Do NOT pass --no-split-per-abi; the Flutter CLI rejects negated
          # forms of non-default flags (exit 64).
          flutter build apk --release \
            --build-number=${{ steps.build_info.outputs.build_number }} \
            --dart-define=API_BASE=${{ vars.API_BASE || 'https://api.eggplant.life' }} \
            --dart-define=SOCKET_URL=${{ vars.SOCKET_URL || 'wss://api.eggplant.life/socket' }}

      - name: 📝 Rename APK + delete any per-ABI stragglers
        run: |
          cd build/app/outputs/flutter-apk
          echo "=== Files before cleanup ==="
          ls -la
          VERSION="${{ steps.build_info.outputs.version_label }}"
          # Defensive: remove any per-ABI APKs if they exist
          rm -f app-armeabi-v7a-release.apk
          rm -f app-arm64-v8a-release.apk
          rm -f app-x86_64-release.apk
          rm -f app-*-release.apk
          # 집파일명: eggplant-v1.0.55.apk (사장님 지시 형식)
          mv app-release.apk "eggplant-${VERSION}.apk"
          echo "=== Files after cleanup (MUST be exactly ONE apk) ==="
          ls -la
          # Safety check: fail the build if more than 1 apk
          COUNT=$(ls -1 *.apk | wc -l)
          if [ "$COUNT" -ne "1" ]; then
            echo "❌ Expected exactly 1 APK, found $COUNT"
            exit 1
          fi

      - name: 📤 Upload APK artifact (single universal APK)
        uses: actions/upload-artifact@v4
        with:
          # 아티팩트 ZIP 이름도 v1.0.<빌드번호> 형식 — eggplant-v1.0.55.zip
          name: eggplant-${{ steps.build_info.outputs.version_label }}
          path: build/app/outputs/flutter-apk/eggplant-*.apk
          retention-days: 90

      - name: 🚀 Create GitHub Release (single universal APK)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_info.outputs.tag }}
          name: 🍆 Eggplant ${{ steps.build_info.outputs.version_label }}
          body: |
            ## 🍆 Eggplant ${{ steps.build_info.outputs.version_label }}

            ### 📥 APK 다운로드
            **`eggplant-${{ steps.build_info.outputs.version_label }}.apk`** 하나만 받으세요. 모든 Android 기기에서 작동합니다.

            ### 📱 설치 방법
            1. 모바일 브라우저에서 APK 파일 탭
            2. "알 수 없는 출처 앱 설치 허용" 설정 (처음 한 번만)
            3. 다운로드 완료 후 APK 탭 → 설치

            ### ⚙️ 빌드 정보
            - **버전**: ${{ steps.build_info.outputs.version_label }}
            - **Built at**: ${{ steps.build_info.outputs.date }}

            ### 🔗 서버 주소
            이 빌드는 **${{ vars.API_BASE || 'https://api.eggplant.life' }}** 을 사용합니다.
            Cloudflare Workers 기반 공개 서버라서 **Wi-Fi 제약 없이 3G/5G 어디서든 동작**합니다 🌍
          files: |
            build/app/outputs/flutter-apk/eggplant-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Summary
        run: |
          echo "## 🍆 빌드 성공! ${{ steps.build_info.outputs.version_label }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **APK**: eggplant-${{ steps.build_info.outputs.version_label }}.apk" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Release 페이지**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.build_info.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
