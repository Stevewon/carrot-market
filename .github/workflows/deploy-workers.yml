name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers-server/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: workers-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers-server/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit || echo "::warning::TS warnings"

      - name: Verify Cloudflare token & account
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "::group::Token verify"
          curl -sS -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/tv.json
          echo ""
          echo "::endgroup::"
          echo "::group::Account access"
          curl -sS -X GET "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/ac.json
          echo ""
          echo "::endgroup::"
          grep -q '"success":true' /tmp/tv.json || { echo "::error::token invalid"; exit 1; }
          grep -q '"success":true' /tmp/ac.json || { echo "::error::account access denied"; exit 1; }

      - name: Resolve D1 database ID (auto-create if missing)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          LIST=$(curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$LIST" | head -c 4000; echo ""
          DB_ID=$(echo "$LIST" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);const h=(j.result||[]).find(x=>x.name==='eggplant-db');if(h)process.stdout.write(h.uuid||h.id||'');}catch(e){}});")
          if [ -z "$DB_ID" ]; then
            echo "Creating eggplant-db..."
            CREATE=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"name":"eggplant-db"}')
            echo "$CREATE"
            DB_ID=$(echo "$CREATE" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{const j=JSON.parse(s);process.stdout.write((j.result&&(j.result.uuid||j.result.id))||'');}catch(e){}});")
          fi
          [ -z "$DB_ID" ] && { echo "::error::cannot resolve DB"; exit 1; }
          echo "DB_ID=$DB_ID"
          sed -i -E "s#^database_id\s*=\s*\".*\"#database_id = \"${DB_ID}\"#" wrangler.toml
          grep database_id wrangler.toml

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply eggplant-db --remote

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
