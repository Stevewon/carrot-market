name: 🍆 Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'server/**'
      - 'workers-server/**'
      - '_github_setup/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'   # Required for AGP 8.9.1 + Kotlin 2.1.0 + compileSdk 36
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Generate build number
        id: build_info
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d-%H%M')
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "tag=v0.1.0-build.${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: 🏗️ Build universal APK (single file, works on ALL Android devices)
        run: |
          flutter build apk --release \
            --build-number=${{ steps.build_info.outputs.build_number }} \
            --dart-define=API_BASE=${{ vars.API_BASE || 'https://api.eggplant.life' }} \
            --dart-define=SOCKET_URL=${{ vars.SOCKET_URL || 'wss://api.eggplant.life/socket' }}

      - name: 📝 Rename APK
        run: |
          cd build/app/outputs/flutter-apk
          ls -la
          DATE="${{ steps.build_info.outputs.date }}"
          SHA="${{ steps.build_info.outputs.short_sha }}"
          mv app-release.apk "eggplant-${DATE}-${SHA}.apk"
          ls -la

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: eggplant-apk-${{ steps.build_info.outputs.short_sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_info.outputs.tag }}
          name: 🍆 Eggplant v0.1.0 Build ${{ steps.build_info.outputs.build_number }}
          body: |
            ## 🍆 Eggplant - QR 기반 익명 중고거래 마켓

            ### 📥 APK 다운로드 (모바일에서 바로 설치)

            아래 **`eggplant-*.apk`** 하나만 다운로드하면 끝! 모든 Android 기기에서 작동합니다.

            ### 📱 설치 방법
            1. 모바일 브라우저에서 APK 파일 탭
            2. "알 수 없는 출처 앱 설치 허용" 설정 (처음 한 번만)
            3. 다운로드 완료 후 APK 탭 → 설치

            ### ⚙️ 빌드 정보
            - **Commit**: `${{ steps.build_info.outputs.short_sha }}`
            - **Build #**: ${{ steps.build_info.outputs.build_number }}
            - **Built at**: ${{ steps.build_info.outputs.date }}

            ### 🔗 서버 주소
            이 빌드는 **${{ vars.API_BASE || 'https://api.eggplant.life' }}** 을 사용합니다.
            Cloudflare Workers 기반 공개 서버라서 **Wi-Fi 제약 없이 3G/5G 어디서든 동작**합니다 🌍
          files: |
            build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Summary
        run: |
          echo "## 🍆 빌드 성공!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Release 페이지**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.build_info.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
