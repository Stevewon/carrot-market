name: eggplant
description: "Eggplant - QR 기반 익명 중고거래 마켓 🍆"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Routing
  go_router: ^14.2.7

  # State Management
  provider: ^6.1.2

  # Network
  http: ^1.2.2
  dio: ^5.7.0
  # Raw WebSocket client (replaces socket_io_client after Cloudflare Workers migration)
  web_socket_channel: ^3.0.1

  # Local Storage (for settings only, not chat)
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Image & Video (supports camera & gallery)
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  video_player: ^2.9.2
  chewie: ^1.8.5
  youtube_player_flutter: ^9.1.1

  # UUID for anonymous device ID
  uuid: ^4.5.0

  # Utils
  intl: ^0.19.0
  jwt_decoder: ^2.0.1

  # WebRTC for anonymous voice calls (P2P)
  flutter_webrtc: ^0.12.0
  permission_handler: ^11.3.1

  # 통화 발신음(뚜루루루) / 수신음 재생.
  # - 발신음: assets/sounds/ringback.mp3 (CC0, 30KB, bigsoundbank.com #1614)
  # - 수신음: 단말 OS 기본 벨소리 (flutter_ringtone_player 가 처리)
  audioplayers: ^6.1.0
  flutter_ringtone_player: ^4.0.0+3

  # GPS 좌표 (동네 인증 + 거리 필터에 사용). 정확한 좌표는 검증 직후 폐기됨.
  geolocator: ^13.0.1

  # Local notifications (foreground/background push without Firebase)
  flutter_local_notifications: ^17.2.3

  # 앱 버전·빌드번호 동적 조회 (앱 정보 화면, 디버그 표시 등)
  package_info_plus: ^8.0.0

  # Note: Screen security (FLAG_SECURE) is implemented natively in
  # MainActivity.kt via MethodChannel (lib/services/secure_screen.dart).
  # This avoids the flutter_windowmanager plugin which has AGP namespace
  # compatibility issues.

  # ── PASS / SMS / KISA 본인확인 SDK (Lv1 verification) ────────────────
  # 운영 배포 시점에 통신사 계약 + 사이트코드 발급 후 활성화.
  # 후보 패키지 (택1 — 계약된 사업자에 맞춰 선택):
  #
  #   pass_dsop_sdk: ^x.y.z       # 드림시큐리티(통합 PASS DSOP)
  #   kg_inicis_pass: ^x.y.z      # KG이니시스 PASS
  #   nice_id_pass: ^x.y.z        # NICE 평가정보
  #   kcb_pass: ^x.y.z            # KCB
  #
  # 활성화 절차:
  #   1) 위 한 줄 주석 해제 + 정확한 버전으로 변경
  #   2) lib/services/verification/identity_provider.dart 의
  #      PassIdentityProvider.verify() 안의 TODO(pass-sdk) 블록을 SDK 호출로 채움
  #   3) Android: AndroidManifest 에 SDK 가 요구하는 receiver/queries 추가
  #      iOS: Info.plist 에 LSApplicationQueriesSchemes(통신사앱) 추가
  #   4) flutter build apk --dart-define=IDENTITY_PROVIDER=pass \
  #                        --dart-define=IDENTITY_FALLBACK_DUMMY=false
  #   5) 운영 백엔드: ALLOW_DUMMY_VERIFY 를 1 → 0 로 내려 dummy 차단

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/eggplant-mascot.png"
  adaptive_icon_background: "#faf5ff"
  adaptive_icon_foreground: "assets/images/eggplant-mascot.png"
