# ====================================================================
# Eggplant 🍆 Backend - Cloudflare Workers
# ====================================================================
# Deploys to: https://api.eggplant.life
# Stack:
#   - Hono (web framework)
#   - D1 (SQLite)           : users, products, product_likes
#   - R2 (object storage)   : product images
#   - Durable Objects       : WebSocket chat + WebRTC call signaling
# ====================================================================

name = "eggplant-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# --------------------------------------------------------------------
# Custom Domain Routing (api.eggplant.life -> this Worker)
# --------------------------------------------------------------------
# DNS 레코드와 Custom Domain 매핑은 Cloudflare Dashboard 에서 직접 관리한다.
# wrangler 에게 자동 생성을 맡기지 않는다 — API token 에 zone:edit 권한이
# 없을 경우 도메인이 끊어질 수 있기 때문.
# 따라서 아래 routes 블록은 의도적으로 비활성화 상태.
# routes = [
#   { pattern = "api.eggplant.life", custom_domain = true }
# ]

# --------------------------------------------------------------------
# D1 Database binding
# --------------------------------------------------------------------
# Create via: npx wrangler d1 create eggplant-db
# Replace database_id below with the one Wrangler prints.
[[d1_databases]]
binding = "DB"
database_name = "eggplant-db"
database_id = "58976cc5-5228-4b62-897f-2b34d0734457"
migrations_dir = "migrations"

# --------------------------------------------------------------------
# R2 Bucket binding (product images)
# --------------------------------------------------------------------
# Create via: npx wrangler r2 bucket create eggplant-uploads
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "eggplant-uploads"

# --------------------------------------------------------------------
# Durable Object binding (WebSocket chat rooms)
# --------------------------------------------------------------------
[[durable_objects.bindings]]
name = "CHAT_HUB"
class_name = "ChatHub"

[[migrations]]
tag = "v1"
# Use SQLite-backed Durable Objects so this works on the Workers FREE plan.
# (Classic `new_classes` requires the Workers Paid plan — $5/month.)
new_sqlite_classes = ["ChatHub"]

# --------------------------------------------------------------------
# Environment variables (set via `wrangler secret put JWT_SECRET`)
# --------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"
# Public URL prefix for image CDN (rewrites /uploads/* to R2 public bucket)
# After creating R2 bucket, enable Public URL and paste it here, e.g.:
# PUBLIC_UPLOAD_URL = "https://pub-xxxxxxxx.r2.dev"
PUBLIC_UPLOAD_URL = ""

# --------------------------------------------------------------------
# Observability
# --------------------------------------------------------------------
[observability]
enabled = true
