# ====================================================================
# Eggplant 🍆 Backend - Cloudflare Workers
# ====================================================================
# Deploys to: https://api.eggplant.life
# Stack:
#   - Hono (web framework)
#   - D1 (SQLite)           : users, products, product_likes
#   - R2 (object storage)   : product images
#   - Durable Objects       : WebSocket chat + WebRTC call signaling
# ====================================================================

name = "eggplant-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# --------------------------------------------------------------------
# Custom Domain Routing
# --------------------------------------------------------------------
# DNS 레코드와 Custom Domain 매핑은 Cloudflare Dashboard 에서 직접 관리한다.
# wrangler 에게 자동 생성을 맡기지 않는다 — API token 에 zone:edit 권한이
# 없을 경우 도메인이 끊어질 수 있기 때문.
#
# 사장님이 Cloudflare Dashboard 에서 수동으로 추가해야 할 도메인:
#   1. api.eggplant.life     → eggplant-api Worker (이미 연결됨)
#
# 어드민은 Cloudflare 가 아닌 Firebase(qrchat-b7a67) 위에서 별도 구축한다.

# --------------------------------------------------------------------
# D1 Database binding
# --------------------------------------------------------------------
# Create via: npx wrangler d1 create eggplant-db
# Replace database_id below with the one Wrangler prints.
[[d1_databases]]
binding = "DB"
database_name = "eggplant-db"
database_id = "58976cc5-5228-4b62-897f-2b34d0734457"
migrations_dir = "migrations"

# --------------------------------------------------------------------
# R2 Bucket binding (product images)
# --------------------------------------------------------------------
# Create via: npx wrangler r2 bucket create eggplant-uploads
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "eggplant-uploads"

# --------------------------------------------------------------------
# Durable Object binding (WebSocket chat rooms)
# --------------------------------------------------------------------
[[durable_objects.bindings]]
name = "CHAT_HUB"
class_name = "ChatHub"

[[migrations]]
tag = "v1"
# Use SQLite-backed Durable Objects so this works on the Workers FREE plan.
# (Classic `new_classes` requires the Workers Paid plan — $5/month.)
new_sqlite_classes = ["ChatHub"]

# --------------------------------------------------------------------
# Environment variables (set via `wrangler secret put JWT_SECRET`)
# --------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"
# Public URL prefix for image CDN (rewrites /uploads/* to R2 public bucket)
# After creating R2 bucket, enable Public URL and paste it here, e.g.:
# PUBLIC_UPLOAD_URL = "https://pub-xxxxxxxx.r2.dev"
PUBLIC_UPLOAD_URL = ""

# --------------------------------------------------------------------
# Agora App ID (큐알쳇과 공유) — 공개 가능 식별자
# --------------------------------------------------------------------
# 큐알쳇 프로젝트의 Agora App ID. 클라이언트도 같은 값을 --dart-define
# 으로 주입받는다. 채널명에 'eggplant_' prefix 를 붙여 큐알쳇 트래픽과
# 분리한다 (서버 토큰 발급 라우트에서 검증).
#
# App Certificate 는 Cloudflare Workers Secret 에 별도 보관:
#   wrangler secret put AGORA_APP_CERTIFICATE
# 사장님이 직접 등록 (Firebase Secret Manager 에서 조회):
#   firebase functions:secrets:access AGORA_APP_CERTIFICATE
AGORA_APP_ID = "66ee6650c8b244b1941fac87eae3fc9a"

# --------------------------------------------------------------------
# FCM (Firebase Cloud Messaging) — 3차 푸시
# --------------------------------------------------------------------
# 사장님 결정 (c): Firebase 프로젝트 신규 생성 후 키 등록 예정.
# 키 등록 전까지는 placeholder 모드 — sendFcm 이 silent skip.
#
# 사장님이 Firebase 프로젝트 만든 후 등록할 secret:
#   1) wrangler secret put FCM_SERVICE_ACCOUNT_JSON
#      → Firebase 콘솔 → 프로젝트 설정 → 서비스 계정 → "새 비공개 키 생성"
#         → 다운로드된 JSON 파일 전체 내용을 그대로 붙여넣기
#   2) wrangler secret put FCM_PROJECT_ID
#      → Firebase 콘솔 → 프로젝트 설정 → "프로젝트 ID" (예: "eggplant-app")
#
# 둘 다 등록되어야 푸시 발송 활성화. 하나라도 비어 있으면 silent skip.

# --------------------------------------------------------------------
# Observability
# --------------------------------------------------------------------
[observability]
enabled = true
